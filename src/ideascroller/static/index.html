<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaScroller</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 20px; font-weight: 700; color: #fff; }
        .header .subtitle { font-size: 12px; color: #888; margin-top: 2px; }
        .settings { font-size: 12px; color: #888; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .settings label { display: flex; align-items: center; gap: 4px; }
        .settings input {
            background: #2a2a3e; color: #fff; border: 1px solid #3a3a4e;
            padding: 2px 8px; border-radius: 4px; width: 55px; text-align: center;
            font-size: 12px;
        }
        .btn-export {
            background: #2a2a3e; color: #888; border: 1px solid #3a3a4e;
            padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer;
        }
        .btn-export:hover { color: #fff; border-color: #555; }
        .controls {
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #2a2a3e;
        }
        .btn {
            border: none; padding: 8px 20px; border-radius: 6px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-start { background: #22c55e; color: #000; }
        .btn-stop { background: #ef4444; color: #fff; }
        .stats {
            margin-left: auto;
            display: flex; gap: 20px; font-size: 13px; color: #888;
        }
        .stats .value { color: #fff; }
        .stats .scraped .value { color: #22c55e; }
        .stats .comments .value { color: #3b82f6; }
        .log-section { padding: 16px 24px; }
        .log-section .label {
            font-size: 12px; color: #666; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px;
        }
        .log-box {
            background: #000; border-radius: 8px; padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
            line-height: 1.8; color: #888; height: 200px; overflow-y: auto;
        }
        .log-entry .time { color: #555; }
        .log-entry .msg { color: #ccc; }
        .results-section { padding: 0 24px 24px; display: none; }
        .results-section.visible { display: block; }
        .results-section .label {
            font-size: 12px; color: #666; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 12px;
        }
        .cluster {
            background: #1a1a2e; border-radius: 8px; padding: 16px;
            margin-bottom: 12px; border-left: 3px solid #f59e0b;
        }
        .cluster.medium { border-left-color: #8b5cf6; }
        .cluster.low { border-left-color: #6b7280; }
        .cluster-header {
            display: flex; justify-content: space-between; align-items: start;
        }
        .cluster-theme { font-size: 14px; font-weight: 600; color: #fff; }
        .cluster-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .cluster-badge {
            padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
            flex-shrink: 0;
        }
        .cluster-badge.HIGH { background: #f59e0b22; color: #f59e0b; }
        .cluster-badge.MEDIUM { background: #8b5cf622; color: #8b5cf6; }
        .cluster-badge.LOW { background: #6b728022; color: #6b7280; }
        .cluster-summary {
            font-size: 13px; color: #aaa; margin-top: 8px; line-height: 1.6;
        }
        .cluster-idea {
            font-size: 12px; color: #3b82f6; margin-top: 8px;
        }
        .analyzing-spinner {
            display: none; padding: 24px; text-align: center; color: #888;
        }
        .analyzing-spinner.visible { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>IdeaScroller</h1>
            <div class="subtitle">TikTok pain point discovery</div>
        </div>
        <div class="settings">
            <label>Min comments: <input type="number" id="threshold" value="300" min="1"></label>
            <label>Per video: <input type="number" id="maxComments" value="30" min="1"></label>
            <label>Max videos: <input type="number" id="maxVideos" value="0" min="0" title="0 = unlimited"></label>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">Start</button>
        <button class="btn btn-stop" id="stopBtn" disabled>Stop</button>
        <div class="stats">
            <span>Videos: <span class="value" id="videosScanned">0</span></span>
            <span class="scraped">Scraped: <span class="value" id="videosScraped">0</span></span>
            <span class="comments">Comments: <span class="value" id="totalComments">0</span></span>
        </div>
    </div>

    <div class="log-section">
        <div class="label">Live Log</div>
        <div class="log-box" id="logBox"></div>
    </div>

    <div class="analyzing-spinner" id="spinner">Analyzing comments with Claude...</div>

    <div class="results-section" id="resultsSection">
        <div class="label" style="display:flex;justify-content:space-between;align-items:center;">
            Analysis Results
            <div style="display:flex;gap:8px;">
                <button class="btn-export" id="exportMd">Export .md</button>
                <button class="btn-export" id="exportJson">Export .json</button>
            </div>
        </div>
        <div id="clustersContainer"></div>
    </div>

    <div class="results-section" id="historySection" style="display:block;margin-top:16px;">
        <div class="label">Past Sessions</div>
        <div id="historyContainer" style="color:#666;font-size:13px;">Loading...</div>
    </div>

    <script>
        var ws = null;
        var sessionId = null;

        function connectWebSocket() {
            var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '/ws');

            ws.onmessage = function(event) {
                var data = JSON.parse(event.data);
                if (data.type === 'log') {
                    addLogEntry(data.timestamp, data.message);
                } else if (data.type === 'stats') {
                    document.getElementById('videosScanned').textContent = data.videos_scanned;
                    document.getElementById('videosScraped').textContent = data.videos_scraped;
                    document.getElementById('totalComments').textContent = data.total_comments;
                } else if (data.type === 'analysis') {
                    document.getElementById('spinner').classList.remove('visible');
                    renderClusters(data.clusters);
                }
            };

            ws.onclose = function() {
                setTimeout(connectWebSocket, 2000);
            };
        }

        function addLogEntry(timestamp, message) {
            var logBox = document.getElementById('logBox');
            var time = new Date(timestamp).toLocaleTimeString();
            var entry = document.createElement('div');
            entry.className = 'log-entry';

            var timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = time;

            var msgSpan = document.createElement('span');
            msgSpan.className = 'msg';
            msgSpan.textContent = ' ' + message;

            entry.appendChild(timeSpan);
            entry.appendChild(msgSpan);
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function startScrolling() {
            var config = {
                comment_threshold: parseInt(document.getElementById('threshold').value),
                max_comments_per_video: parseInt(document.getElementById('maxComments').value),
                max_videos: parseInt(document.getElementById('maxVideos').value),
            };
            fetch('/config', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config),
            }).then(function() {
                return fetch('/start', { method: 'POST' });
            }).then(function(response) {
                return response.json();
            }).then(function(data) {
                if (data.session_id) {
                    sessionId = data.session_id;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('stopBtn').disabled = false;
                    document.getElementById('resultsSection').classList.remove('visible');
                    document.getElementById('spinner').classList.remove('visible');
                }
            });
        }

        function stopScrolling() {
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('spinner').classList.add('visible');

            fetch('/stop', { method: 'POST' }).then(function(response) {
                return response.json();
            }).then(function() {
                document.getElementById('startBtn').disabled = false;
            });
        }

        function renderClusters(clusters) {
            var container = document.getElementById('clustersContainer');
            while (container.firstChild) {
                container.removeChild(container.firstChild);
            }

            var section = document.getElementById('resultsSection');
            section.classList.add('visible');

            if (clusters.length === 0) {
                var noResults = document.createElement('p');
                noResults.style.cssText = 'color: #888; padding: 16px;';
                noResults.textContent = 'No significant pain points found in the collected comments.';
                container.appendChild(noResults);
                return;
            }

            for (var i = 0; i < clusters.length; i++) {
                var cluster = clusters[i];
                var potentialClass = cluster.potential === 'MEDIUM' ? 'medium' : cluster.potential === 'LOW' ? 'low' : '';

                var el = document.createElement('div');
                el.className = 'cluster ' + potentialClass;

                var header = document.createElement('div');
                header.className = 'cluster-header';

                var info = document.createElement('div');

                var theme = document.createElement('div');
                theme.className = 'cluster-theme';
                theme.textContent = cluster.theme;
                info.appendChild(theme);

                var meta = document.createElement('div');
                meta.className = 'cluster-meta';
                meta.textContent = cluster.comment_count + ' comments across ' + cluster.video_count + ' videos';
                info.appendChild(meta);

                header.appendChild(info);

                var badge = document.createElement('div');
                badge.className = 'cluster-badge ' + cluster.potential;
                badge.textContent = cluster.potential + ' POTENTIAL';
                header.appendChild(badge);

                el.appendChild(header);

                var summary = document.createElement('div');
                summary.className = 'cluster-summary';
                summary.textContent = cluster.summary;
                el.appendChild(summary);

                var idea = document.createElement('div');
                idea.className = 'cluster-idea';
                idea.textContent = '\uD83D\uDCA1 ' + cluster.app_idea;
                el.appendChild(idea);

                container.appendChild(el);
            }
        }

        var lastClusters = null;

        function exportMarkdown() {
            if (!lastClusters || lastClusters.length === 0) return;
            var md = '# IdeaScroller Results\n\n';
            for (var i = 0; i < lastClusters.length; i++) {
                var c = lastClusters[i];
                md += '## ' + (i + 1) + '. ' + c.theme + '\n\n';
                md += c.summary + '\n\n';
                md += '**App idea:** ' + c.app_idea + '\n\n';
                md += '*' + c.comment_count + ' comments across ' + c.video_count + ' videos*\n\n';
                if (c.sample_comments && c.sample_comments.length > 0) {
                    md += 'Sample comments:\n';
                    for (var j = 0; j < c.sample_comments.length; j++) {
                        md += '> ' + c.sample_comments[j] + '\n\n';
                    }
                }
                md += '---\n\n';
            }
            var blob = new Blob([md], { type: 'text/markdown' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ideascroller-results.md';
            a.click();
        }

        function exportJson() {
            if (!lastClusters || lastClusters.length === 0) return;
            var blob = new Blob([JSON.stringify({ clusters: lastClusters }, null, 2)], { type: 'application/json' });
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ideascroller-results.json';
            a.click();
        }

        function loadHistory() {
            fetch('/sessions').then(function(r) { return r.json(); }).then(function(data) {
                var container = document.getElementById('historyContainer');
                while (container.firstChild) container.removeChild(container.firstChild);
                if (!data.sessions || data.sessions.length === 0) {
                    container.textContent = 'No past sessions yet.';
                    return;
                }
                for (var i = 0; i < data.sessions.length; i++) {
                    var s = data.sessions[i];
                    var row = document.createElement('div');
                    row.style.cssText = 'padding:8px 0;border-bottom:1px solid #2a2a3e;display:flex;justify-content:space-between;align-items:center;';

                    var info = document.createElement('span');
                    var date = new Date(s.started_at).toLocaleString();
                    info.textContent = date + ' \u2014 ' + s.videos_scraped + ' videos, ' + s.total_comments + ' comments';

                    var btn = document.createElement('button');
                    btn.className = 'btn-export';
                    btn.textContent = 'View results';
                    btn.setAttribute('data-session-id', s.id);
                    btn.addEventListener('click', function() {
                        var sid = this.getAttribute('data-session-id');
                        fetch('/results/' + sid).then(function(r) { return r.json(); }).then(function(d) {
                            if (d.clusters) {
                                lastClusters = d.clusters;
                                renderClusters(d.clusters);
                            }
                        });
                    });

                    row.appendChild(info);
                    row.appendChild(btn);
                    container.appendChild(row);
                }
            }).catch(function() {
                document.getElementById('historyContainer').textContent = 'Failed to load history.';
            });
        }

        // Override renderClusters to also store for export
        var _origRenderClusters = renderClusters;
        renderClusters = function(clusters) {
            lastClusters = clusters;
            _origRenderClusters(clusters);
        };

        document.getElementById('startBtn').addEventListener('click', startScrolling);
        document.getElementById('stopBtn').addEventListener('click', stopScrolling);
        document.getElementById('exportMd').addEventListener('click', exportMarkdown);
        document.getElementById('exportJson').addEventListener('click', exportJson);

        addLogEntry(new Date().toISOString(), 'Ready \u2014 press Start to begin scrolling');
        connectWebSocket();

        fetch('/config').then(function(r) { return r.json(); }).then(function(data) {
            document.getElementById('threshold').value = data.comment_threshold;
            document.getElementById('maxComments').value = data.max_comments_per_video;
            document.getElementById('maxVideos').value = data.max_videos;
        });

        loadHistory();
    </script>
</body>
</html>
